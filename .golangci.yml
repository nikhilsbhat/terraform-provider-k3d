version: "2"
run:
  concurrency: 10
  issues-exit-code: 1
  tests: true
linters:
  default: all
  disable:
    - copyloopvar
    - depguard
    - exhaustruct
    - forbidigo
    - forcetypeassert
    - gochecknoglobals
    - goconst
    - mnd
    - nolintlint
    - paralleltest
    - prealloc
    - varnamelen
    - noinlineerr
    - tagliatelle
    - wrapcheck
  settings:
    cyclop:
      max-complexity: 20
    funlen:
      lines: 160
    gocognit:
      min-complexity: 50
    lll:
      line-length: 165
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - mnd
        path: _test\.go
      - linters:
          - gocritic
        text: 'unnecessaryDefer:'
    paths:
      - _test\.go$
      - Makefile
      - README.md
      - Dockerfile
      - scripts/
      - vendor/
      - docs/
      - examples/
      - third_party$
      - builtin$
severity:
  default: error
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - _test\.go$
      - Makefile
      - README.md
      - Dockerfile
      - scripts/
      - vendor/
      - docs/
      - examples/
      - third_party$
      - builtin$
